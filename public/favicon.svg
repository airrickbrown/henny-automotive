<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Shield body -->
  <path d="M4 20 Q24 5 44 20 L44 38 L24 46 L4 38 Z" fill="#131313"/>

  <!-- Red top arch (brand mark) -->
  <path d="M4 20 Q24 5 44 20" stroke="#e11d2e" strokeWidth="4" strokeLinecap="round"/>

  <!-- Ghost shield border -->
  <path d="M4 20 L4 38 L24 46 L44 38 L44 20" stroke="#e11d2e" strokeWidth="1" strokeOpacity="0.35" strokeLinejoin="round"/>

  <!-- Car body (white silhouette) -->
  <path d="M9 34 L9 29 L13 24 L18 21 L24 20 L30 20 L35 22 L39 26 L40 30 L40 34 Z"
        fill="white" fillOpacity="0.9"/>

  <!-- Windshield -->
  <path d="M17 24 L18 21 L24 20 L27 21 L25 24 Z" fill="black" fillOpacity="0.25"/>

  <!-- Rear window -->
  <path d="M27 20 L30 20 L35 22 L34 24 L29 24 Z" fill="black" fillOpacity="0.2"/>

  <!-- Front wheel -->
  <circle cx="15" cy="35" r="5" fill="#131313" stroke="white" strokeWidth="1.5" strokeOpacity="0.6"/>
  <circle cx="15" cy="35" r="1.8" fill="white" fillOpacity="0.3"/>

  <!-- Rear wheel -->
  <circle cx="34" cy="35" r="5" fill="#131313" stroke="white" strokeWidth="1.5" strokeOpacity="0.6"/>
  <circle cx="34" cy="35" r="1.8" fill="white" fillOpacity="0.3"/>
</svg>
