<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Shield body -->
  <path d="M6 20 L6 36 L24 46 L42 36 L42 20 L24 8 Z" fill="#1a1a1a"/>

  <!-- Red top arch -->
  <path d="M6 20 Q24 4 42 20" stroke="#E11D2E" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Shield border -->
  <path d="M6 20 L6 36 L24 46 L42 36 L42 20" stroke="#E11D2E" stroke-width="1.2" stroke-opacity="0.4" stroke-linejoin="round" fill="none"/>

  <!-- Horizontal band -->
  <rect x="5" y="26" width="38" height="8" fill="black" fill-opacity="0.5"/>

  <!-- Car silhouette -->
  <path d="M10 30 L10 26 L14 22 L19 20 L24 19.5 L29 20 L34 22 L38 26 L38 30 Z"
        fill="white" fill-opacity="0.85"/>
  <path d="M18 23 L19 20 L24 19.5 L27 20 L26 23 Z" fill="#1a1a1a" fill-opacity="0.4"/>
  <path d="M27 20 L29 20 L34 22 L33 23 L28 23 Z" fill="#1a1a1a" fill-opacity="0.3"/>

  <!-- Wheels -->
  <circle cx="15" cy="31" r="4" fill="#1a1a1a" stroke="white" stroke-width="1.2" stroke-opacity="0.7"/>
  <circle cx="33" cy="31" r="4" fill="#1a1a1a" stroke="white" stroke-width="1.2" stroke-opacity="0.7"/>

  <!-- Shield bottom point -->
  <path d="M16 38 L24 46 L32 38" fill="#1a1a1a" stroke="#E11D2E" stroke-width="1" stroke-opacity="0.3" stroke-linejoin="round"/>

  <!-- HENNY text -->
  <text x="24" y="36" font-family="Arial Black, sans-serif" font-weight="900" font-size="5.5"
        fill="white" text-anchor="middle" letter-spacing="1.5">HENNY</text>
</svg>
